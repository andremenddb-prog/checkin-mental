<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado Oficial | Check-in Mental</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a29bfe; --bg: #0b0b0b; --card: #161616; --text: #ffffff; --accent: #00d2d3; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; box-sizing: border-box; text-align: center; }
        
        .badge { color: var(--accent); font-size: 11px; font-weight: 700; letter-spacing: 1px; border: 1px solid var(--accent); padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 15px; }
        
        h1 { font-size: 20px; margin: 0 0 5px 0; font-weight: 700; }
        .user-name { color: var(--primary); }

        .age-section { margin: 20px 0; padding: 15px; background: #000; border-radius: 15px; border: 1px solid #222; }
        .age-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .age-number { font-size: 50px; font-weight: 900; color: var(--primary); line-height: 1; }

        .chart-box { background: #000; border-radius: 15px; padding: 15px; margin-top: 20px; height: 220px; border: 1px solid #222; }
        
        .btn-download { background: #27ae60; color: #fff; text-decoration: none; font-weight: 800; padding: 18px; border-radius: 12px; display: block; margin-top: 25px; cursor: pointer; border: none; font-size: 16px; transition: 0.2s; }
        .btn-download:hover { background: #2ecc71; }

        .footer-text { margin-top: 20px; font-size: 11px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">RELATÓRIO FINAL</div>
        <h1>Mapeamento de <span class="user-name" id="nome-exibir">...</span></h1>
        
        <div class="age-section">
            <div class="age-label">Idade Mental Estimada</div>
            <div class="age-number" id="idade-mental">--</div>
        </div>
        
        <p style="font-size: 14px; font-weight: 700; margin: 20px 0 10px 0;">Indicadores Emocionais:</p>
        
        <div class="chart-box">
            <canvas id="meuGrafico"></canvas>
        </div>

        <a href="COLE_AQUI_O_LINK_DO_PDF_DO_CANVA" target="_blank" class="btn-download">
            📥 BAIXAR MEU GUIA (PDF)
        </a>

        <p class="footer-text">Este diagnóstico é baseado em padrões comportamentais e não substitui acompanhamento médico profissional.</p>
    </div>

    <script>
        // Recuperar dados do localStorage
        const nome = localStorage.getItem('uNome') || "Explorador";
        const pontos = parseInt(localStorage.getItem('uPontos')) || 500;
        
        document.getElementById('nome-exibir').innerText = nome;

        // Cálculo da Idade Mental
        const idadeCalculada = Math.floor(pontos / 20) + 12;
        document.getElementById('idade-mental').innerText = idadeCalculada + " ANOS";

        // Configuração do Gráfico (Ajustado para não bugar)
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Ansiedade', 'Stress', 'Foco'],
                datasets: [{
                    data: [
                        Math.min(95, 110 - (pontos/12)), 
                        Math.min(92, 105 - (pontos/11)), 
                        Math.max(30, (pontos/15) + 20)
                    ],
                    backgroundColor: ['#a29bfe', '#6c5ce7', '#00d2d3'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 100, ticks: { color: '#444', font: { size: 10 } }, grid: { color: '#222' } },
                    x: { ticks: { color: '#fff', font: { size: 11, weight: 'bold' } }, grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
