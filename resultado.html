<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Oficial | Check-in Mental Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a29bfe; --bg: #050505; --card: #121212; --text: #f0f0f0; --accent: #00d2d3; --secondary: #6c5ce7; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 28px; text-align: center; border: 1px solid #222; box-sizing: border-box; position: relative; }
        
        /* Selo de Autenticidade */
        .badge { background: rgba(0, 210, 211, 0.1); color: var(--accent); padding: 6px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid var(--accent); display: inline-block; margin-bottom: 20px; letter-spacing: 1px; }
        
        h1 { color: #fff; font-size: 24px; font-weight: 800; margin: 10px 0; }
        .user-name { color: var(--primary); text-transform: uppercase; }

        /* Caixa de Idade Mental */
        .age-container { margin: 25px 0; position: relative; }
        .age-box { font-size: 72px; font-weight: 900; color: var(--primary); background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 2px solid #333; border-radius: 24px; padding: 20px; display: inline-block; width: 80%; box-shadow: 0 0 30px rgba(162, 155, 254, 0.15); }
        .age-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: -10px; }

        /* Gráfico */
        .chart-section { background: #0c0c0c; border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid #1a1a1a; }
        .chart-container { position: relative; height: 260px; width: 100%; }

        /* Botões */
        .actions { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }
        .btn-pdf { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pdf:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-guide { background: transparent; color: #888; border: 1px solid #333; padding: 12px; border-radius: 15px; text-decoration: none; font-size: 13px; font-weight: 600; }

        /* Footer */
        .footer-info { margin-top: 25px; font-size: 12px; color: #555; line-height: 1.5; border-top: 1px solid #222; padding-top: 20px; }
        
        /* Esconder botões na geração do PDF */
        .no-pdf { display: block; }
    </style>
</head>
<body>

    <div class="container" id="pdf-content">
        <div class="badge">CERTIFICADO DE ANÁLISE COMPORTAMENTAL</div>
        
        <h1>Diagnóstico de <span class="user-name" id="nome-title">...</span></h1>
        
        <div class="age-container">
            <div class="age-label">Idade Mental Calculada</div>
            <div class="age-box" id="idade-mental">--</div>
        </div>
        
        <div class="chart-section">
            <p style="color:#fff; font-weight: bold; margin-bottom: 15px; font-size: 14px;">Mapeamento de Equilíbrio Emocional</p>
            <div class="chart-container">
                <canvas id="meuGrafico"></canvas>
            </div>
        </div>

        <div class="actions no-pdf">
            <button class="btn-pdf" onclick="baixarPDF()">
                📥 BAIXAR RESULTADO (PDF)
            </button>
            <a href="LINK_DO_SEU_GUIA_FIXO_CANVA.pdf" class="btn-guide" target="_blank">
                📖 Acessar Guia de Apoio Completo
            </a>
        </div>

        <div class="footer-info">
            ID da Transação: <span id="id-transacao"></span><br>
            Baseado em Protocolo de Análise Subconsciente 2026.
        </div>
    </div>

    <script>
        // 1. Recuperar Dados
        const nome = localStorage.getItem('uNome') || "Explorador";
        const pontos = parseInt(localStorage.getItem('uPontos')) || 500;
        
        // 2. Preencher Nome e ID Aleatório
        document.getElementById('nome-title').innerText = nome;
        document.getElementById('id-transacao').innerText = Math.random().toString(36).substr(2, 9).toUpperCase();

        // 3. Cálculo da Idade Mental Realista (Formula: Pontos / 20 + 12)
        const idadeReal = Math.floor(pontos / 20) + 12;
        document.getElementById('idade-mental').innerText = idadeReal + " ANOS";

        // 4. Configurar Gráfico com os pontos reais
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Ansiedade', 'Stress', 'Maturidade', 'Foco'],
                datasets: [{
                    data: [
                        Math.min(95, 110 - (pontos/12)), // Ansiedade
                        Math.min(92, 105 - (pontos/11)), // Stress
                        Math.min(98, (pontos/10)),       // Maturidade
                        Math.max(30, (pontos/15) + 20)   // Foco
                    ],
                    backgroundColor: ['#a29bfe', '#6c5ce7', '#00d2d3', '#f1c40f'],
                    borderRadius: 10,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: '#222' }, ticks: { color: '#555' } },
                    x: { grid: { display: false }, ticks: { color: '#fff', font: { weight: 'bold' } } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 5. Função para Gerar o PDF da Tela
        function baixarPDF() {
            const element = document.getElementById('pdf-content');
            const botoes = document.querySelector('.actions');
            
            // Esconde os botões temporariamente para o PDF sair limpo
            botoes.style.display = 'none';

            const opt = {
                margin: 10,
                filename: `Diagnostico-Mental-${nome}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#050505' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Mostra os botões de volta
                botoes.style.display = 'flex';
            });
        }
    </script>
</body>
</html>
