<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resultado Oficial | Check-in Mental</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a29bfe; --bg: #050505; --card: #121212; --text: #ffffff; --accent: #00d2d3; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        .container { 
            width: 100%; 
            max-width: 400px; 
            background: var(--card); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid #222; 
            text-align: center;
        }
        
        .badge { color: var(--accent); font-size: 10px; font-weight: 800; letter-spacing: 1px; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 50px; display: inline-block; margin-bottom: 15px; }
        
        h1 { font-size: 22px; margin: 5px 0; font-weight: 800; color: #fff; line-height: 1.2; }
        .user-name { color: var(--primary); text-transform: uppercase; display: block; margin-top: 8px; font-size: 24px; }

        .result-box { margin: 25px 0; padding: 25px; background: #000; border-radius: 20px; border: 1px solid #333; box-shadow: inset 0 0 20px rgba(162, 155, 254, 0.1); }
        .result-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; letter-spacing: 1px; }
        .result-number { font-size: 52px; font-weight: 900; color: var(--primary); line-height: 1; }

        .chart-section { background: #000; border-radius: 20px; padding: 15px; margin-top: 20px; border: 1px solid #222; }
        .chart-container { height: 200px; width: 100%; position: relative; }

        .btn-download { 
            background: var(--accent); 
            color: #000; 
            border: none;
            font-weight: 900; 
            padding: 20px; 
            border-radius: 18px; 
            display: block; 
            width: 100%;
            margin-top: 30px; 
            font-size: 16px; 
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-download:active { transform: scale(0.98); }

        .footer-note { margin-top: 25px; font-size: 10px; color: #444; font-weight: 600; text-transform: uppercase; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container" id="conteudo-resultado">
        <div class="badge">DIAGNÓSTICO CONCLUÍDO</div>
        
        <h1>MAPEAMENTO DE:</h1>
        <span class="user-name" id="nome-exibir">ANDRÉ</span>
        
        <div class="result-box">
            <div class="result-label">Idade Mental Estimada</div>
            <div class="result-number" id="idade-mental">--</div>
        </div>
        
        <div class="chart-section">
            <p style="font-size: 12px; font-weight: 800; color: #555; margin-bottom: 10px; text-transform: uppercase;">Indicadores Emocionais</p>
            <div class="chart-container">
                <canvas id="meuGrafico"></canvas>
            </div>
        </div>

        <button class="btn-download" onclick="gerarPDF()" id="btn-pdf">
            📥 BAIXAR MEU DIAGNÓSTICO (PDF)
        </button>

        <div class="footer-note">Protocolo de Análise Digital | 2026</div>
    </div>

    <script>
        // 1. Pega os dados salvos (Se o nome estiver errado no teste, ele corrige aqui)
        let nomeSalvo = localStorage.getItem('uNome') || "André";
        if(nomeSalvo.toLowerCase() === "ander") nomeSalvo = "André"; // Correção automática se vier "Ander"
        
        const pontos = parseInt(localStorage.getItem('uPontos')) || 500;
        
        document.getElementById('nome-exibir').innerText = nomeSalvo;
        
        // 2. Cálculo da Idade
        const idadeFinal = Math.floor(pontos / 20) + 12;
        document.getElementById('idade-mental').innerText = idadeFinal + " ANOS";

        // 3. Gráfico (Ajustado para não bugar)
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Ansiedade', 'Stress', 'Foco'],
                datasets: [{
                    data: [
                        Math.min(95, 110 - (pontos/12)), 
                        Math.min(92, 105 - (pontos/11)), 
                        Math.max(30, (pontos/15) + 20)
                    ],
                    backgroundColor: ['#a29bfe', '#6c5ce7', '#00d2d3'],
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 100, ticks: { color: '#333', font: { size: 9 } }, grid: { color: '#1a1a1a' } },
                    x: { ticks: { color: '#fff', font: { size: 11, weight: 'bold' } }, grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 4. FUNÇÃO PARA BAIXAR O PDF DA TELA
        function gerarPDF() {
            const btn = document.getElementById('btn-pdf');
            btn.innerText = "GERANDO ARQUIVO...";
            btn.style.opacity = "0.5";

            const elemento = document.getElementById('conteudo-resultado');
            const opcoes = {
                margin: 10,
                filename: `Diagnostico-${nomeSalvo}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#050505' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opcoes).from(elemento).save().then(() => {
                btn.innerText = "📥 BAIXAR MEU DIAGNÓSTICO (PDF)";
                btn.style.opacity = "1";
            });
        }
    </script>
</body>
</html>
